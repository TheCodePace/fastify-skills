name: CI

on:
  push:
    branches: [main]
    paths:
      - "skills/**/rules/**"
      - "packages/validate-rules/**"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "skills/**/rules/**"
      - "packages/validate-rules/**"
      - "package.json"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
          check-latest: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Validate rules
        run: pnpm validate